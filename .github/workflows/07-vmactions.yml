  openbsd:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hwarch:
          - "arm64"
          - "x86_64"
        relver:
          - 7.4
          - 7.6
          - 7.8
    steps:
      - uses: actions/checkout@v6
      - name: Start VM
        uses: vmactions/openbsd-vm@v1
        with:
          release: "${{matrix.relver}}"
          arch: "${{matrix.hwarch}}"
          usesh: true
          sync: scp
          copyback: false
      - name: Info
        shell: openbsd {0}
        run: |
          set -eu
          uname -a
          whoami
          sysctl hw.model
          sysctl hw.ncpu
          sysctl hw.physmem
          sysctl hw.usermem
          pwd
          ls -lah
          cc -v || true
      - name: Prereqs
        shell: openbsd {0}
        run: |
          set -eu
          ## default = https://cdn.openbsd.org/pub/OpenBSD
          echo "https://ftp.eu.openbsd.org/pub/OpenBSD" > /etc/installurl
          pkg_add -u
          pkg_add curl
          curl -L https://cpanmin.us/ -o cpanm
          chmod +x cpanm
          ./cpanm -n --installdeps .
          ./cpanm -n JSON
          perl -V
      - name: Build
        shell: openbsd {0}
        run: |
          set -eu
          env AUTHOR_MODE=0 perl Makefile.PL
          make -j2
      - name: Test
        shell: openbsd {0}
        run: |
          set -eu
          env AUTHOR_MODE=0 prove -j2 -b t

  haiku-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: vmactions/haiku-vm@v1
        with:
          usesh: true
          sync: scp
          copyback: false
          run: |
            uname -a
            pkgman refresh
            pkgman install -y git make gcc perl
            perl -V
            gcc -v
            if ! command -v cpanm >/dev/null 2>&1; then
              curl -L https://cpanmin.us | perl - App::cpanminus
              export PATH="$HOME/perl5/bin:$PATH"
            fi
            cpanm -n --installdeps .
            cpanm JSON
            env AUTHOR_MODE=0 perl Makefile.PL
            make -j4
            env AUTHOR_MODE=0 prove -b t

  solaris-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: vmactions/solaris-vm@v1
        with:
          release: "11.4-gcc"
          arch: "x86_64"
          usesh: true
          sync: scp
          copyback: false
          run: |
            uname -a

            pkg refresh
            pkg install --accept \
              developer/gcc \
              developer/build/gnu-make \
              developer/versioning/git \
              runtime/perl-532
            export PATH="/usr/gnu/bin:/usr/gcc/bin:/usr/perl5/bin:$PATH"
            perl -V
            gcc -v

            if ! command -v cpanm >/dev/null 2>&1; then
              curl -L https://cpanmin.us | perl - App::cpanminus
              export PATH="$HOME/perl5/bin:$PATH"
            fi
            cpanm -n --installdeps .
            cpanm JSON

            env AUTHOR_MODE=0 perl Makefile.PL
            gmake -j4
            env AUTHOR_MODE=0 prove -b t
