  freebsd:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hwarch:
          - "arm64"
          - "x86_64"
        relver:
          - "14.4"
          - "15.0"
    steps:
      - uses: actions/checkout@v6
      - name: Start VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "${{matrix.relver}}"
          arch: "${{matrix.hwarch}}"
          usesh: true
          sync: scp
          copyback: false
      - name: Info
        shell: freebsd {0}
        run: |
          set -eu
          uname -a
          whoami
          sysctl hw.model
          sysctl hw.ncpu
          sysctl hw.physmem
          sysctl hw.usermem
          pwd
          ls -lah
          cc -v || true
          gcc -v || true
      - name: Prereqs
        shell: freebsd {0}
        run: |
          set -eu
          pkg update
          pkg install -y curl perl5 p5-App-cpanminus p5-Math-BigInt p5-JSON
          curl -L https://cpanmin.us/ -o cpanm
          chmod +x cpanm
          ./cpanm -n --installdeps .
          ./cpanm -n JSON
          perl -V
      - name: Build
        shell: freebsd {0}
        run: |
          set -eu
          env AUTHOR_MODE=0 perl Makefile.PL
          make -j2
      - name: Test
        shell: freebsd {0}
        run: |
          set -eu
          env AUTHOR_MODE=0 prove -j2 -b t

