name: 05-debian

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  debian-eol:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        codename:
          - bullseye
          - buster
          - stretch
          - jessie
          - wheezy
          - squeeze
          - lenny
          - etch
          - sarge
    container:
      image: debian/eol:${{ matrix.codename }}
    steps:
      - name: Show OS release
        run: cat /etc/os-release || cat /etc/debian_version || echo unknown-release
      - name: Install dependencies
        run: |
          cat > /etc/apt/sources.list <<'EOF'
          deb http://archive.debian.org/debian ${{ matrix.codename }} main
          deb http://archive.debian.org/debian-security ${{ matrix.codename }}/updates main
          EOF
          printf 'Acquire::Check-Valid-Until "false";\n' > /etc/apt/apt.conf.d/99archive
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --force-yes \
            ca-certificates \
            gcc \
            git \
            libc6-dev \
            libmath-bigint-perl \
            make \
            perl
          DEBIAN_FRONTEND=noninteractive apt-get install -y --force-yes libjson-perl || echo IGNORE-libjson-perl
      - name: Checkout code using git
        run: |
          git clone --single-branch --branch $(echo ${GITHUB_REF#refs/heads/}) https://github.com/${{ github.repository }}.git
      - name: perl -V
        run: perl -V
      - name: gcc -v
        run: gcc -v
      - name: Run build
        run: |
          cd $(basename ${{ github.repository }})
          perl Makefile.PL
          make -j4
        env:
          AUTHOR_MODE: 0
      - name: Run tests
        run: |
          cd $(basename ${{ github.repository }})
          prove -j 4 -b t
        env:
          AUTHOR_MODE: 0
