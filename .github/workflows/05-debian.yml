name: 05-debian

on:
  push:
    branches:
      - 'master'
    tags-ignore:
      - '*'

jobs:
  debianeol:
    runs-on: ubuntu-24.04
    container:
      image: debian/eol:lenny
    steps:
      - name: Show OS release
        run: cat /etc/os-release || echo no-os-release
      - name: Install dependencies
        run: |
          cat > /etc/apt/sources.list <<'EOF'
          deb http://archive.debian.org/debian wheezy main
          deb http://archive.debian.org/debian-security wheezy/updates main
          EOF
          printf 'Acquire::Check-Valid-Until "false";\n' > /etc/apt/apt.conf.d/99archive
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            gcc \
            git \
            libc6-dev \
            libjson-perl \
            libmath-bigint-perl \
            make \
            perl
      - name: Checkout code using git
        run: |
          git clone --single-branch --branch $(echo ${GITHUB_REF#refs/heads/}) https://github.com/${{ github.repository }}.git
      - name: perl -V
        run: perl -V
      - name: gcc -v
        run: gcc -v
      - name: Run build
        run: |
          cd $(basename ${{ github.repository }})
          perl Makefile.PL
          make -j4
        env:
          AUTHOR_MODE: 0
      - name: Run tests
        run: |
          cd $(basename ${{ github.repository }})
          prove -b t
        env:
          AUTHOR_MODE: 0
